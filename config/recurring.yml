production:
  clear_finished_jobs:
    command: SolidQueue::Job.clear_finished_in_batches
    schedule: every day at 3:00am
  expire_old_ribbons:
    command: ReadRibbon.expire_old_ribbons!
    schedule: every day at 4:00am
  fill_flagged_cache:
    command: FlaggedCommenters.new("1m").commenters
    schedule: every 15 minutes
  populate_comment_stats:
    command: CommentStat.daily_fill!
    schedule: every day at 4:00am
  restic:
    class: ResticJob
    schedule: every day at 1 am
  sitemap:
    command: 'SitemapGenerator::Interpreter.run(config_file: ENV["CONFIG_FILE"], verbose: false)'
    schedule: every day at 2 am
  fill_users_graph_cache:
    command: 'Stats.fill_users_graph_cache'
    schedule: every day at 12:00am
  fill_active_users_graph_cache:
    command: 'Stats.fill_active_users_graph_cache'
    schedule: every day at 12:03am
  fill_stories_graph_cache:
    command: 'Stats.fill_stories_graph_cache'
    schedule: every day at 12:06am
  fill_comments_graph_cache:
    command: 'Stats.fill_comments_graph_cache'
    schedule: every day at 12:09am
  fill_votes_graph_cache:
    command: 'Stats.fill_votes_graph_cache'
    schedule: every day at 12:12am
  traffic_helper:
    command: TrafficHelper.cache_traffic!
    schedule: every 5 minutes
  fetch_email_blocklist:
    class: FetchEmailBlocklistJob
    schedule: every 7 days
  fetch_iana_tlds:
    class: FetchIanaTldsJob
    schedule: every 1 month
  expire_page_cache:
    command: 'system("find #{Rails.public_path.join("cache")} -type f -not -mmin 5 -delete")'
    schedule: every 1 minute
  mail_new_activity:
    command: 'load Rails.root.join("script/mail_new_activity.rb")'
    schedule: every 5 minutes
  mastodon_post:
    command: 'load Rails.root.join("script/mastodon_post.rb")'
    schedule: every 5 minutes

